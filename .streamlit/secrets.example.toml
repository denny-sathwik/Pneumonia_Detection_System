[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "replace-with-a-strong-random-secret"
client_id = "replace-with-your-google-client-id"
client_secret = "replace-with-your-google-client-secret"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

[app]
# Optional. Leave empty to allow any authenticated Google account.
allowed_emails = ["you@example.com"]
